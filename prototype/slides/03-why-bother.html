<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="top-bar">
    <div class="reminder-tag">(REMINDER)</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot filled"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="content top">
    <div class="headline size-100">
      Why<br>
      <em>bother?</em>
    </div>

    <div style="margin-top:60px; display:flex; flex-direction:column; gap:24px; max-width:880px;">
      <div style="display:flex; gap:24px;">
        <div class="pill orange" style="transform:rotate(-2deg);">
          <span class="num">01</span> Fresh data
        </div>
        <div class="pill lavender" style="transform:rotate(2deg);">
          <span class="num">02</span> Real citations
        </div>
      </div>
      <div style="display:flex; gap:24px;">
        <div class="pill green" style="transform:rotate(-1deg);">
          <span class="num">03</span> Cheaper than fine-tuning
        </div>
      </div>
      <div style="display:flex; gap:24px;">
        <div class="pill cream" style="transform:rotate(3deg);">
          <span class="num">04</span> Works on private docs
        </div>
      </div>
    </div>

    <div class="flower white" style="position:absolute; right:20px; bottom:30px; transform:rotate(-15deg);">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="petal p5"></div>
      <div class="center">
        <div class="smiley">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="handle">@AIBYTES</div>
    <div class="arrow">→</div>
  </div>
</body>
</html>
