<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="top-bar">
    <div class="reminder-tag">(REMINDER)</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot filled"></div>
    </div>
  </div>

  <div class="content center">
    <div class="headline size-90">
      <em>Save</em> this.<br>
      <em>Follow</em> for<br>
      more.
    </div>

    <div class="speech-bubble" style="margin-top:60px; transform:rotate(-3deg);">
      You just learned RAG! ✨
    </div>

    <div class="flower" style="position:absolute; right:20px; top:60px; transform:rotate(20deg);">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="petal p5"></div>
      <div class="center">
        <div class="smiley">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>

    <div class="flower white" style="position:absolute; right:60px; bottom:40px; transform:rotate(-12deg);">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="petal p5"></div>
      <div class="center">
        <div class="smiley">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>

    <div class="ticket orange" style="position:absolute; left:0; bottom:30px; transform:rotate(-3deg);">
      ★ THE END ★
    </div>
  </div>

  <div class="bottom-bar">
    <div class="handle">@AIBYTES</div>
    <div class="arrow" style="color: var(--green);">♥</div>
  </div>
</body>
</html>
