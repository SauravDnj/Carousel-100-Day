<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="top-bar">
    <div class="reminder-tag">(REMINDER)</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot filled"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="content top">
    <div class="headline size-80">
      The <em>flow,</em><br>
      step by step.
    </div>

    <div style="margin-top:60px;">
      <div class="flow-step">
        <div class="step-num">1</div>
        <div class="step-text"><em>Embed</em> your docs<br>into vectors</div>
      </div>
      <div class="flow-step">
        <div class="step-num lavender">2</div>
        <div class="step-text">User <em>asks</em> a question</div>
      </div>
      <div class="flow-step">
        <div class="step-num green">3</div>
        <div class="step-text"><em>Retrieve</em> similar chunks</div>
      </div>
      <div class="flow-step">
        <div class="step-num">4</div>
        <div class="step-text">LLM <em>answers</em> with context</div>
      </div>
    </div>

    <div class="ticket orange" style="position:absolute; right:0; top:40px; transform:rotate(8deg);">
      4 STAGES
    </div>
  </div>

  <div class="bottom-bar">
    <div class="handle">@AIBYTES</div>
    <div class="arrow">→</div>
  </div>
</body>
</html>
